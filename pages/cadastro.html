<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form" action="../includes/cadastrar.php" method="POST">
            <h2>Criar Conta</h2>

            <div class="entrada-dados">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="entrada-dados">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" required>
            </div>

            <div class="entrada-dados">
                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" name="nascimento" required>
            </div>

            <div class="entrada-dados">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone" required>
            </div>

            <div class="entrada-dados">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="entrada-dados">
                <label for="senha">Digite a senha</label>
                <input type="password" id="senha1" name="senha1" required> 
                
                <label for="senha">Digite a senha novamente</label>
                <input type="password" id="senha2" name="senha2" required>
            </div>

            <button type="submit" class="botao-login">Finalizar Cadastro</button>
        </form>

    </div>
    <script src="../assets/js/script.js"></script>
</body>
